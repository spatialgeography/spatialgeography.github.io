<script>
  document.addEventListener('DOMContentLoaded', function() {
    let searchWindow = null;
    let lastSearchedText = '';

    document.addEventListener('mouseup', function(e) {
      setTimeout(function() {
        const selectedText = window.getSelection().toString().trim();
        
        if (selectedText && (selectedText !== lastSearchedText || !searchWindow || searchWindow.closed)) {
          const url = 'https://www.google.com/search?q=' + encodeURIComponent(selectedText);
          const w = 800;
          const h = 600;
          const left = (window.innerWidth / 2) - (w / 2) + window.screenX;
          const top = (window.innerHeight / 2) - (h / 2) + window.screenY;
          
          if (searchWindow && !searchWindow.closed) {
            searchWindow.location.href = url;
            searchWindow.focus();
          } else {
            searchWindow = window.open(url, 'searchPopup', `width=${w},height=${h},top=${top},left=${left},scrollbars=yes,resizable=yes`);
          }
          
          lastSearchedText = selectedText;
        }
      }, 150); // wait slightly longer to ensure selection is cleared on a simple click
    });

    document.addEventListener('mousedown', function(e) {
      if (searchWindow && !searchWindow.closed) {
        searchWindow.close();
        searchWindow = null;
        lastSearchedText = ''; // reset so the same text can be selected again
      }
    });
  });
</script>
