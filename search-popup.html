<script>
  document.addEventListener('DOMContentLoaded', function() {
    let selectedText = '';
    let searchWindow = null;

    document.addEventListener('selectionchange', function() {
      const selection = window.getSelection();
      selectedText = selection.toString().trim();
    });

    document.addEventListener('mouseup', function(e) {
      setTimeout(function() {
        if (selectedText) {
          const url = 'https://www.google.com/search?q=' + encodeURIComponent(selectedText);
          const w = 800;
          const h = 600;
          const left = (window.innerWidth / 2) - (w / 2) + window.screenX;
          const top = (window.innerHeight / 2) - (h / 2) + window.screenY;
          
          if (searchWindow && !searchWindow.closed) {
            searchWindow.location.href = url;
            searchWindow.focus();
          } else {
            searchWindow = window.open(url, 'searchPopup', `width=${w},height=${h},top=${top},left=${left},scrollbars=yes,resizable=yes`);
          }
        }
      }, 10);
    });

    document.addEventListener('mousedown', function(e) {
      if (searchWindow && !searchWindow.closed) {
        searchWindow.close();
        searchWindow = null;
      }
    });
  });
</script>
